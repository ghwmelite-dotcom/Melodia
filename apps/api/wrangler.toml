name = "melodia-api"
main = "src/index.ts"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "melodia-db"
database_id = "local"

[[kv_namespaces]]
binding = "KV"
id = "local"

[vars]
ENVIRONMENT = "development"
CORS_ORIGIN = "http://localhost:5173"
MAX_FREE_SONGS_PER_DAY = "5"

[ai]
binding = "AI"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "melodia-assets"

[durable_objects]
bindings = [
  { name = "SONG_SESSION", class_name = "SongGenerationSession" }
]

[[migrations]]
tag = "v1"
new_classes = ["SongGenerationSession"]
