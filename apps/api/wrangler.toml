name = "melodia-api"
main = "src/index.ts"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "melodia-db"
database_id = "62765762-3f39-4ffe-bb2b-32b9e27df74e"

[[kv_namespaces]]
binding = "KV"
id = "15c7e7932496423b9f95562574792c2f"

[vars]
ENVIRONMENT = "production"
CORS_ORIGIN = "https://melodia-awn.pages.dev,https://melodia.pages.dev"
MAX_FREE_SONGS_PER_DAY = "5"

[ai]
binding = "AI"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "melodia-assets"

[durable_objects]
bindings = [
  { name = "SONG_SESSION", class_name = "SongGenerationSession" }
]

[[migrations]]
tag = "v1"
new_classes = ["SongGenerationSession"]
